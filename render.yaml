services:
  - type: web
    name: latiendadecomics
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: latiendadecomics-db
          property: connectionString

databases:
  - name: latiendadecomics-db
    databaseName: latiendadecomics
    user: ltcuser
    plan: free
